server:
  port: 28080

spring:
  application:
    name: service-gateway

  cloud:
    nacos:
      discovery:
        server-addr: 192.168.31.17:18848
#        ip: 192.168.31.17
      config:
        server-addr: 192.168.31.17:18848
        # 关闭 Spring Boot 的 import 校验
        import-check:
          enabled: false

    gateway:
      discovery:
        locator:
          enabled: false   # 明确关闭，避免卡死

      routes:
        - id: user
          uri: lb://service-user
          predicates:
            - Path=/user/**

        - id: order
          uri: lb://service-order
          predicates:
            - Path=/order/**

  redis:
    host: 192.168.31.17  # 修改为实际的 Redis 服务器地址
    port: 16379           # 确认端口号正确
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

# JWT配置
jwt:
  secret: ${JWT_SECRET:gateway-secret}  # 必须通过环境变量JWT_SECRET配置，生产环境禁止使用默认值
  expire: ${JWT_EXPIRE:86400000}  # 24小时，单位毫秒，可通过环境变量JWT_EXPIRE配置

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
    reactor.netty.http.client: DEBUG

server:
  port: 8082

spring:
  application:
    name: service-order
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:192.168.31.17:18848}
    sentinel:
      datasource:
        ds1:
          redis:
            host: ${REDIS_HOST:192.168.31.17}
            port: ${REDIS_PORT:16379}
            database: 0
            master-id: mymaster
            rule-key: sentinel-flow-rules
            rule-type: flow
            data-type: json
            channel: sentinel-flow-channel
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:192.168.31.17}:${MYSQL_PORT:13306}/${MYSQL_DB:demo_db}?allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      pool-name: HikariCP
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
  redis:
    host: ${REDIS_HOST:192.168.31.17}
    port: ${REDIS_PORT:16379}
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.example.order
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:192.168.31.17:19876}
  producer:
    group: order-producer-group

# JWT配置
jwt:
  secret: ${JWT_SECRET:gateway-secret}  # 必须通过环境变量JWT_SECRET配置，生产环境禁止使用默认值
  expire: ${JWT_EXPIRE:86400000}  # 24小时，单位毫秒，可通过环境变量JWT_EXPIRE配置

# 日志级别
logging:
  level:
    com.example: DEBUG

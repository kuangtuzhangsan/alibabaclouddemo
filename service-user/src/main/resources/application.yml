server:
  port: 28081

spring:
  application:
    name: service-user
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:192.168.31.17:18848}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:192.168.31.17}:${MYSQL_PORT:13306}/${MYSQL_DB:demo_db}?allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      pool-name: HikariCP
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
  cache:
    type: caffeine
    caffeine:
      spec: initialCapacity=100,maximumSize=10000,expireAfterWrite=10m
  redis:
    host: ${REDIS_HOST:192.168.31.17}
    port: ${REDIS_PORT:16379}
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.example.user
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:192.168.31.17:19876}
  producer:
    group: function-producer-group

# 自定义配置
function:
  execute:
    timeout-ms: 500

# 日志级别
logging:
  level:
    com.example: DEBUG
